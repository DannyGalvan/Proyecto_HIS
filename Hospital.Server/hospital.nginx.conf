server {
    listen 443 ssl;
    server_name his-salud.duckdns.org;

    # Rutas de los certificados
    ssl_certificate /etc/letsencrypt/live/his-salud.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/his-salud.duckdns.org/privkey.pem;

    # Optimización opcional de SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass         http://127.0.0.1:5005/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
    }
}